{% extends 'stories/base.html' %}

{% block content %}
<section class="panel narrow">
  <h1>{{ title }}</h1>

  {% if hint %}
    <p class="hint">{{ hint }}</p>
  {% endif %}

  <form method="post" class="form">
    {% csrf_token %}
    {{ form.as_p }}

    <button class="btn primary" type="submit">
      {{ title }}
    </button>
  </form>

  {% if show_forgot_password %}
    <p class="hint" style="margin-top: 16px;">
      <a href="{% url 'password_reset' %}">
        Забыли пароль?
      </a>
    </p>
  {% endif %}
</section>
{% endblock %}

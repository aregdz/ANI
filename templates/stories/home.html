<div id="map" aria-label="Интерактивная карта мира с народными историями"></div>

{% block scripts %}
<script>
  ymaps.ready(initMap);

  function initMap() {
    const map = new ymaps.Map('map', {
      center: [25, 20],
      zoom: 2,
      controls: ['zoomControl', 'fullscreenControl', 'typeSelector']
    });

    const stories = [
      {% for story in stories %}
      {
        id: {{ story.id }},
        fio: "{{ story.fio|escapejs }}",
        date: "{{ story.story_date|date:'d.m.Y' }}",
        lat: {{ story.latitude|unlocalize }},
        lng: {{ story.longitude|unlocalize }},
        url: "{% url 'story_detail' story.id %}"
      }{% if not forloop.last %},{% endif %}
      {% endfor %}
    ];

    const clusterer = new ymaps.Clusterer({
      preset: 'islands#invertedDarkOrangeClusterIcons',
      groupByCoordinates: false,
      clusterDisableClickZoom: false,
      clusterOpenBalloonOnClick: true,
      clusterBalloonContentLayout: 'cluster#balloonCarousel',
      clusterBalloonPanelMaxMapArea: 0,
      clusterBalloonPagerSize: 5
    });

    const placemarks = [];

    stories.forEach((story) => {
      const lat = Number(story.lat);
      const lng = Number(story.lng);

      if (Number.isFinite(lat) && Number.isFinite(lng)) {
        const placemark = new ymaps.Placemark(
          [lat, lng],
          {
            balloonContentHeader: story.fio,
            balloonContentBody: `
              <small>${story.date}</small><br><br>
              <a href="${story.url}">Открыть историю</a>
            `,
            balloonContentFooter: 'АНИ',
            hintContent: story.fio
          },
          {
            preset: 'islands#darkOrangeDotIcon'
          }
        );

        placemarks.push(placemark);
      }
    });

    clusterer.add(placemarks);
    map.geoObjects.add(clusterer);

    if (placemarks.length > 0) {
      map.setBounds(clusterer.getBounds(), {
        checkZoomRange: true,
        zoomMargin: 40
      });
    }
  }
</script>
{% endblock %}
